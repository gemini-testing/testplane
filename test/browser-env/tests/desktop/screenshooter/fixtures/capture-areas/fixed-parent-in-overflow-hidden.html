<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }
    body {
        background: #f0f0f0;
    }

    .container {
        position: absolute;
        top: 100px;
        left: 100px;
        width: 300px;
        height: 200px;
        overflow: hidden;
        border: 2px solid #333;
        background: #fff;
    }

    .fixed-parent {
        position: fixed;
        top: 50px;
        left: 50px;
        width: 200px;
        height: 100px;
    }

    .target {
        width: 100%;
        height: 100%;
        background: #d45d79;
    }
</style>

<div class="container">
    <div class="fixed-parent">
        <div class="target"></div>
    </div>
</div>
