<style>
    * {
        margin: 0;
        padding: 0;
    }
    .container {
        position: relative;
        width: 600px;
        height: 500px;
        margin: 50px;
    }
    .target {
        width: 150px;
        height: 100px;
        background-color: #4caf50;
        position: absolute;
        top: 160px;
        left: 200px;
    }
    /* translate: shifted far left and up */
    .target::before {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        width: 60px;
        height: 40px;
        background-color: #ff9800;
        transform: translate(-100px, -100px) rotate(45deg);
    }
    /* scale + skew: grows from bottom-right corner */
    .target::after {
        content: "";
        position: absolute;
        bottom: -10px;
        right: -10px;
        width: 50px;
        height: 50px;
        background-color: #2196f3;
        transform: scale(2.5) skewX(15deg);
        transform-origin: 0% 0%;
    }
</style>
<div class="container">
    <div class="target">Transformed pseudos</div>
</div>
