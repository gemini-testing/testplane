<style>
    html,
    body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        font-family: Arial, sans-serif;
        background: #f6f8fc;
    }

    /*
     * Banner height is exactly 50vh = viewportHeight / 2.
     * Resulting safe area height = viewportHeight - 50vh = 50vh = origHeight / 2.
     * The guard condition is strict: resultingHeight < origHeight / 2 (not <=).
     * So this shrink IS applied — unlike huge-fixed-banner where it is skipped.
     */
    .banner {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        height: 50vh;
        background: linear-gradient(180deg, #0f2a59 0%, #224483 100%);
        z-index: 100;
        box-shadow: 0 12px 40px rgba(15, 42, 89, 0.45);
    }

    .target {
        width: 760px;
        height: 200px;
        margin: calc(50vh + 40px) auto 0;
        background: #ffffff;
        border: 2px solid #89b6ff;
        border-radius: 12px;
    }
</style>

<div class="banner"></div>
<div class="target"></div>
