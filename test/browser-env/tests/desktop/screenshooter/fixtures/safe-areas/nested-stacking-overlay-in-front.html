<style>
    html,
    body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        font-family: Arial, sans-serif;
        background: #eef3f7;
    }

    /*
     * .app-shell creates a stacking context at z:10 (low).
     * The target lives inside it with no own z-index, so:
     *   targetChain = [{ctx: documentElement, z: 10}, {ctx: .app-shell, z: 10}]
     *
     * The fixed overlay is at z:50 (higher than .app-shell):
     *   overlayChain = [{ctx: documentElement, z: 50}]
     *
     * isChainBehind: common ctx = documentElement → 50 < 10 → false → NOT behind.
     * Complementary to nested-stacking-overlay-behind: confirms the chain
     * comparison works in both directions.
     */
    .app-shell {
        position: relative;
        z-index: 10;
        padding: 48px 0;
    }

    .target {
        width: 760px;
        height: 420px;
        margin: 0 auto;
        background: linear-gradient(140deg, #fff 0%, #dcecff 100%);
        border-radius: 14px;
        border: 2px solid #8db8ff;
        box-shadow: 0 18px 45px rgba(60, 90, 160, 0.22);
    }

    .fixed-overlay {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        height: 88px;
        z-index: 50;
        background: #1f2a44;
        color: #fff;
        display: flex;
        align-items: center;
        padding: 0 24px;
        box-sizing: border-box;
    }
</style>

<div class="app-shell">
    <div class="target"></div>
</div>
<div class="fixed-overlay">Overlay (z:50) — in front of app-shell (z:10)</div>
