<style>
    html,
    body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        font-family: Arial, sans-serif;
        background: #eef3f7;
    }

    /*
     * .content-layer creates a stacking context at z:10 (position + z-index).
     * The fixed overlay is at z:5 (lower). At the documentElement level:
     *   overlayChain = [{ctx: documentElement, z: 5}]
     *   targetChain  = [{ctx: documentElement, z: 10}, {ctx: .content-layer, z: 10}]
     * isChainBehind: 5 < 10 → overlay IS behind → must NOT shrink safe area.
     */
    .content-layer {
        position: relative;
        z-index: 10;
        padding: 48px 0;
    }

    .target {
        width: 760px;
        height: 420px;
        margin: 0 auto;
        background: linear-gradient(140deg, #fff 0%, #dcecff 100%);
        border-radius: 14px;
        border: 2px solid #8db8ff;
        box-shadow: 0 18px 45px rgba(60, 90, 160, 0.22);
    }

    /*
     * z-index: 5 — below .content-layer (z:10) → behind the target.
     * opacity: 0.9 — triggers createsStackingContext via opacity < 1.
     * This verifies that an opacity-based stacking context does not prevent
     * correct z-chain comparison.
     */
    .fixed-overlay {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        height: 88px;
        z-index: 5;
        opacity: 0.9;
        background: #1f2a44;
        color: #fff;
        display: flex;
        align-items: center;
        padding: 0 24px;
        box-sizing: border-box;
    }
</style>

<div class="content-layer">
    <div class="target"></div>
</div>
<div class="fixed-overlay">Overlay (z:5, opacity:0.9) — behind target layer (z:10)</div>
