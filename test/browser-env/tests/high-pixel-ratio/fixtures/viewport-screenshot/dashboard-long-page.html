<style>
    html,
    body {
        margin: 0;
        padding: 0;
        width: 100%;
        min-height: 100%;
        background: #f4f7fb;
        font-family: Arial, sans-serif;
    }

    .header {
        position: sticky;
        top: 0;
        height: 64px;
        background: #1f3556;
        border-bottom: 2px solid #3b5886;
    }

    .content {
        width: 100%;
        max-width: 980px;
        margin: 0 auto;
        padding: 24px;
        box-sizing: border-box;
    }

    .hero {
        height: 220px;
        border: 2px solid #92bbff;
        border-radius: 14px;
        background: linear-gradient(140deg, #ffffff 0%, #e3f0ff 100%);
        box-shadow: 0 10px 24px rgba(45, 82, 139, 0.18);
    }

    .cards {
        margin-top: 20px;
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 14px;
    }

    .card {
        height: 180px;
        border: 2px solid #b6d4ff;
        border-radius: 12px;
        background: #ffffff;
    }

    .feed {
        margin-top: 24px;
    }

    .feed-item {
        height: 260px;
        margin-bottom: 18px;
        border: 2px solid #c0d9ff;
        border-radius: 12px;
        background: #ffffff;
    }

    .wide-strip {
        width: 1400px;
        height: 28px;
        margin-top: 24px;
        background: #ccdffd;
        border-radius: 8px;
    }
</style>

<div class="header"></div>
<div class="content">
    <div class="hero"></div>
    <div class="cards">
        <div class="card"></div>
        <div class="card"></div>
        <div class="card"></div>
        <div class="card"></div>
    </div>
    <div class="feed">
        <div class="feed-item"></div>
        <div class="feed-item"></div>
        <div class="feed-item"></div>
        <div class="feed-item"></div>
        <div class="feed-item"></div>
        <div class="feed-item"></div>
    </div>
    <div class="wide-strip"></div>
</div>
