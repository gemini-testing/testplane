<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Viewport ignore elements</title>
        <style>
            html,
            body {
                margin: 0;
                min-height: 100%;
                font-family: Arial, sans-serif;
                background: #f4f1ea;
            }

            .page {
                box-sizing: border-box;
                min-height: 100vh;
                padding: 40px;
                background: linear-gradient(90deg, rgba(0, 0, 0, 0.06) 1px, transparent 1px),
                    linear-gradient(rgba(0, 0, 0, 0.06) 1px, transparent 1px), #f4f1ea;
                background-size: 40px 40px;
            }

            .panel {
                width: 360px;
                padding: 24px;
                border: 2px solid #2d4756;
                background: #ffffff;
            }

            .title {
                margin: 0 0 16px;
                color: #1f2d34;
                font-size: 24px;
                line-height: 32px;
            }

            .row {
                width: 280px;
                height: 28px;
                margin-top: 12px;
                background: #8fb8de;
            }

            .to-be-ignored {
                position: absolute;
                top: 132px;
                left: 96px;
                width: 180px;
                height: 64px;
                border: 4px solid #8f1f1f;
                background: #d94a38;
            }
        </style>
    </head>
    <body>
        <main class="page">
            <section class="panel">
                <h1 class="title">Viewport capture</h1>
                <div class="row"></div>
                <div class="row"></div>
                <div class="row"></div>
            </section>
            <div class="to-be-ignored"></div>
        </main>
    </body>
</html>
